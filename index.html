<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Study Portal</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; color: #333; text-align: center; padding: 50px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #4a90e2; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .btn { display: block; background: #4a90e2; color: white; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #357abd; transform: translateY(-3px); }
        .badge { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Project Research Archive</h1>
        <p>Resource links for 2026 Spring Semester</p>

        <div class="grid">
            
            <div class="item">
                <span class="badge">Physics Simulation</span>
                <a href="https://classroom-6x.github.io/slope/" class="btn" target="_blank">Launch Lab A</a>
            </div>

            <div class="item">
                <span class="badge">Velocity Test</span>
                <a href="https://ubg77.github.io/edit/slope/" class="btn" target="_blank">Launch Lab B</a>
            </div>

            <div class="item">
                <span class="badge">Video Reference</span>
                <a href="https://www.youtube-nocookie.com/embed/26wkmhXE4oQ" class="btn" target="_blank">View Lecture</a>
            </div>

            </div>
    </div>

</body>
</html>
